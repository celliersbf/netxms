# --------------------------------------------------------------------------- # NetXMS macOS Agent — Compile & Interactive Debug Workflow # --------------------------------------------------------------------------- # Trigger manually via GitHub UI or CLI to validate that the NetXMS agent # builds cleanly on macOS (Apple Silicon) and to attach an interactive SSH # debugging session immediately after compilation. # ---------------------------------------------------------------------------
name: macOS Agent Compile + Debug

on: workflow_dispatch: # Manual trigger only — no CI automation

jobs: build-and-debug: name: Build agent on macOS and drop into tmate runs-on: macos-14 # Apple Silicon ARM64 runner (M-series)

steps:
  # --------------------------------------------------------------------
  # Step 1 — Checkout repository with full submodule initialisation
  # --------------------------------------------------------------------
  - name: Checkout NetXMS (with submodules)
    uses: actions/checkout@v4
    with:
      repository: netxms/netxms
      submodules: recursive

  # --------------------------------------------------------------------
  # Step 2 — Provision system-level build prerequisites via Homebrew
  # --------------------------------------------------------------------
  - name: Install build dependencies (Homebrew)
    run: |
      brew update
      brew install automake autoconf libtool openssl

  # --------------------------------------------------------------------
  # Step 3 — Bootstrap, configure (agent only), and compile
  # --------------------------------------------------------------------
  - name: Bootstrap, configure, and compile the agent
    run: |
      ./reconf
      ./configure --with-agent --with-openssl
      make

  # --------------------------------------------------------------------
  # Step 4 — Create agent config pointing to the target NetXMS server
  # --------------------------------------------------------------------
  - name: Write nxagentd.conf for monitor.softsol.co.za
    run: |
      cat > /tmp/nxagentd.conf << 'CONF'
      # NetXMS agent configuration — generated by CI
      MasterServers = monitor.softsol.co.za
      LogFile = /tmp/nxagentd.log
      DebugLevel = 9
      CONF
      echo "Agent config written to /tmp/nxagentd.conf"
      cat /tmp/nxagentd.conf

  # --------------------------------------------------------------------
  # Step 5 — Interactive SSH debugging session via tmate
  # --------------------------------------------------------------------
  - name: Start tmate debug session
    uses: mxschmitt/action-tmate@v3
    timeout-minutes: 15           # Hard ceiling to conserve runner quota
    with:
      limit-access-to-actor: true # Only the user who triggered the run may connect
